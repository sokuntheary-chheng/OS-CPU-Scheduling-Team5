<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PyScheduling Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container-fluid app-root">
      <div class="row">
        <div class="col-3 sidebar p-3">
          <h5>Scheduler Configuration</h5>
          <div class="mb-2">
            <label for="algorithm" class="form-label">Algorithm</label>
            <select id="algorithm" class="form-select">
              <option value="FCFS">First Come First Serve (FCFS)</option>
              <option value="SJF">Shortest Job First (SJF)</option>
              <option value="SRT">Shortest Remaining Time (SRT)</option>
              <option value="RR">Round Robin (RR)</option>
              <option value="MLFQ">Multilevel Feedback Queue (MLFQ)</option>
            </select>
          </div>
          <div class="mb-2">
            <label for="process-name" class="form-label">Process</label>
            <input id="process-name" type="text" class="form-control" value="P1" placeholder="Enter process name">
          </div>
          <div class="row gx-2 mb-2">
            <div class="col-6">
              <label for="arrival-time" class="form-label">Arrival Time</label>
              <input id="arrival-time" type="number" class="form-control" value="0" min="0">
            </div>
            <div class="col-6">
              <label for="burst-time" class="form-label">Burst Time</label>
              <input id="burst-time" type="number" class="form-control" value="1" min="1">
            </div>
          </div>
          <div class="mb-2" id="quantum-group" style="display:none;">
            <label for="quantum" class="form-label">Quantum Time</label>
            <input id="quantum" type="number" class="form-control" value="2" min="1">
          </div>
          <div class="row gx-2 mb-2">
            <div class="col-6" id="q0-group" style="display:none;">
              <label for="q0" class="form-label">Q0 (MLFQ)</label>
              <input id="q0" type="number" class="form-control" value="2" min="1">
            </div>
            <div class="col-6" id="q1-group" style="display:none;">
              <label for="q1" class="form-label">Q1 (MLFQ)</label>
              <input id="q1" type="number" class="form-control" value="4" min="1">
            </div>
          </div>

          <div class="d-grid gap-2 mt-3">
            <button id="add-process-btn" type="button" class="btn btn-primary">Add Process</button>
            <button id="runBtn" class="btn btn-success">Run Simulation</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-light">Reset</button>
          </div>

          <div id="simStatus" class="mt-3 text-muted small">Ready</div>

          <div class="mt-4">
            <small class="text-muted">You can add processes and run different algorithms. Results display on the right.</small>
          </div>
        </div>

        <div class="col-6 main p-3">
          <div class="section-block mb-4">
            <div class="section-header">
              <h5 class="mb-0">Process Table</h5>
            </div>
            <div class="section-body pt-3">
              <table class="table table-sm" id="procTable">
                <thead>
                  <tr><th>PID</th><th>Arrival</th><th>Burst</th><th></th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <div class="section-block">
            <div class="section-header">
              <h5 class="mb-0">Execution Timeline (Gantt Chart)</h5>
            </div>
            <div class="section-body pt-3">
              <div id="gantt" class="gantt-area"></div>
            </div>
          </div>
        </div>

        <div class="col-3 metrics p-3">
          <h5>Performance Metrics</h5>
          <canvas id="perfChart" height="120"></canvas>
          <div class="metrics-card mt-3">
            <div class="metrics-card-header">
              <h6 class="mb-0">Summary</h6>
            </div>
            <div class="metrics-card-body">
              <div class="metric-item">
                <div class="metric-label">Average Waiting Time</div>
                <div class="metric-value" id="avgWaiting">-</div>
              </div>
              <div class="metric-item">
                <div class="metric-label">Average Turnaround Time</div>
                <div class="metric-value" id="avgTurnaround">-</div>
              </div>
              <div class="metric-item">
                <div class="metric-label">CPU Utilization</div>
                <div class="metric-value" id="cpuUtil">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <template id="proc-row-template">
      <tr>
        <td class="pid"></td>
        <td class="arrival"></td>
        <td class="burst"></td>
        <td><button class="btn btn-sm btn-danger remove">Remove</button></td>
      </tr>
    </template>

    <script src="/static/js/app.js"></script>
  </body>
</html>
