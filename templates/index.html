<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PyScheduling Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container-fluid app-root">
      <div class="row">
        <div class="col-3 sidebar p-3">
          <h5>Scheduler Configuration</h5>
          <div class="mb-2">
            <label for="algorithm" class="form-label">Algorithm</label>
            <select id="algorithm" class="form-select">
              <option value="FCFS">First Come First Serve (FCFS)</option>
              <option value="SJF">Shortest Job First (SJF)</option>
              <option value="SRT">Shortest Remaining Time (SRT)</option>
              <option value="RR">Round Robin (RR)</option>
              <option value="MLFQ">Multilevel Feedback Queue (MLFQ)</option>
            </select>
          </div>
          <div class="mb-2" id="quantum-group">
            <label class="form-label">Quantum Time</label>
            <input id="quantum" type="number" class="form-control" value="2" min="1">
          </div>
          <div class="mb-2" id="q0-group">
            <label class="form-label">Q0 (MLFQ)</label>
            <input id="q0" type="number" class="form-control" value="2" min="1">
          </div>
          <div class="mb-2" id="q1-group">
            <label class="form-label">Q1 (MLFQ)</label>
            <input id="q1" type="number" class="form-control" value="4" min="1">
          </div>

          <div class="d-grid gap-2 mt-3">
            <button id="addProcBtn" class="btn btn-primary">Add Process</button>
            <button id="runBtn" class="btn btn-success">Run Simulation</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-light">Reset</button>
          </div>

          <div class="mt-4">
            <small class="text-muted">You can add processes and run different algorithms. Results display on the right.</small>
          </div>
        </div>

        <div class="col-6 main p-3">
          <h5>Process Table</h5>
          <table class="table table-sm" id="procTable">
            <thead>
              <tr><th>PID</th><th>Arrival</th><th>Burst</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>

          <h5 class="mt-3">Execution Timeline (Gantt Chart)</h5>
          <div id="gantt" class="gantt-area"></div>
        </div>

        <div class="col-3 metrics p-3">
          <h5>Performance Metrics</h5>
          <canvas id="perfChart" height="120"></canvas>
          <div class="mt-3">
            <div class="card mb-2"><div class="card-body p-2"><strong>Average Waiting Time:</strong> <span id="avgWaiting">-</span></div></div>
            <div class="card mb-2"><div class="card-body p-2"><strong>Average Turnaround Time:</strong> <span id="avgTurnaround">-</span></div></div>
            <div class="card"><div class="card-body p-2"><strong>CPU Utilization:</strong> <span id="cpuUtil">-</span></div></div>
          </div>
        </div>
      </div>
    </div>

    <template id="proc-row-template">
      <tr>
        <td class="pid"></td>
        <td class="arrival"></td>
        <td class="burst"></td>
        <td><button class="btn btn-sm btn-danger remove">Remove</button></td>
      </tr>
    </template>

    <script src="/static/js/app.js"></script>
  </body>
</html>
